<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Practical Quiz 2 </title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet"/>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; background: #0a0a0a; overflow: hidden; }

    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

    #topbar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 32px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
    }
    #topbar .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem; font-weight: 300; letter-spacing: 0.18em;
      color: #e8d9be; text-transform: uppercase;
    }
    #topbar .brand span { color: #c9a96e; font-weight: 600; }
    #topbar .meta {
      font-size: 0.68rem; letter-spacing: 0.12em; color: rgba(255,255,255,0.40);
      text-transform: uppercase;
    }

    #bottombar {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center; gap: 28px;
      padding: 18px 32px;
      background: linear-gradient(to top, rgba(0,0,0,0.72), transparent);
    }
    .hint {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.67rem; letter-spacing: 0.10em; color: rgba(255,255,255,0.45);
      text-transform: uppercase;
    }
    .key {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 24px; height: 24px; padding: 0 5px;
      border: 1px solid rgba(255,255,255,0.22); border-radius: 4px;
      font-size: 0.60rem; color: rgba(255,255,255,0.65);
      background: rgba(255,255,255,0.06);
    }

    #badge {
      position: absolute; bottom: 58px; right: 32px;
      background: rgba(201,169,110,0.10); border: 1px solid rgba(201,169,110,0.28);
      border-radius: 8px; padding: 10px 16px; text-align: right;
    }
    #badge .label { font-size: 0.60rem; letter-spacing: 0.14em; color: rgba(255,255,255,0.32); text-transform: uppercase; }
    #badge .value { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; color: #c9a96e; letter-spacing: 0.06em; }

    #vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.60) 100%);
    }
  </style>
</head>

<div id="hud">
  <div id="vignette"></div>
  <div id="topbar">
    <div class="brand"> <span>Studio</span> </div>
    <div class="meta">&nbsp;·&nbsp; </div>
  </div>
  <div id="bottombar">
    <div class="hint"><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span>&nbsp; Move</div>
    <div class="hint"><span class="key">Drag</span>&nbsp; Look</div>
    <div class="hint"><span class="key">Scroll</span>&nbsp; Zoom</div>
  </div>
  <div id="badge">
    <div class="label"></div>
    <div class="value"></div>
  </div>
</div>
