<!DOCTYPE html>
<html>
<head>
  <title> Quiz 2 - Distinction+</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    button{
      position:absolute;
      top:20px;
      left:20px;
      padding:10px 15px;
      font-size:16px;
      background:#222;
      color:white;
      border:none;
      cursor:pointer;
      z-index:999;
    }
  </style>
</head>

<body>

<button onclick="toggleDayNight()">Toggle Day / Night</button>

<a-scene shadow="type:pcfsoft">

  <!-- SKY -->
  <a-sky id="sky" color="#87CEEB"></a-sky>

  <!-- LIGHTS -->
  <a-entity id="ambientLight" light="type:ambient; intensity:0.5"></a-entity>

  <a-entity id="sun"
            light="type:directional; intensity:1; castShadow:true"
            position="5 10 5">
  </a-entity>

  <!-- GROUND -->
  <a-plane rotation="-90 0 0"
           width="50"
           height="50"
           color="#4CAF50"
           shadow="receive:true">
  </a-plane>

  <!-- ================= TABLE ================= -->
  <a-box position="0 1 0" width="3" height="0.2" depth="2"
         color="#8B4513"
         shadow="cast:true; receive:true">
  </a-box>

  <!-- Table Legs -->
  <a-cylinder position="-1.3 0.5 0.8" radius="0.07" height="1"></a-cylinder>
  <a-cylinder position="1.3 0.5 0.8" radius="0.07" height="1"></a-cylinder>
  <a-cylinder position="-1.3 0.5 -0.8" radius="0.07" height="1"></a-cylinder>
  <a-cylinder position="1.3 0.5 -0.8" radius="0.07" height="1"></a-cylinder>

  <!-- ================= CHAIRS ================= -->
  <a-box position="-2 0.6 0" width="1" height="0.2" depth="1" color="#795548"></a-box>
  <a-box position="-2 1.3 -0.45" width="1" height="1.2" depth="0.1"></a-box>

  <a-box position="2 0.6 0" width="1" height="0.2" depth="1" color="#795548"></a-box>
  <a-box position="2 1.3 -0.45" width="1" height="1.2" depth="0.1"></a-box>

  <!-- ================= MILO TIN (Clickable) ================= -->
  <a-cylinder id="milo"
              class="clickable"
              position="-0.7 1.25 0"
              radius="0.25"
              height="0.7"
              color="#1B5E20">
  </a-cylinder>

  <a-text value="MILO"
          position="-0.7 1.3 0.26"
          align="center"
          color="white"
          width="2">
  </a-text>

  <!-- ================= MILK TIN ================= -->
  <a-cylinder id="milk"
              class="clickable"
              position="0.7 1.25 0"
              radius="0.25"
              height="0.7"
              color="#ECEFF1">
  </a-cylinder>

  <a-text value="MILK"
          position="0.7 1.3 0.26"
          align="center"
          color="black"
          width="2">
  </a-text>

  <!-- ================= CUPS ================= -->
  <a-cylinder position="0 1.15 0.5" radius="0.15" height="0.3" color="#FFF"></a-cylinder>
  <a-torus position="0.22 1.15 0.5" radius="0.1" radius-tubular="0.02"
           rotation="0 90 0" color="#FFF"></a-torus>

  <a-cylinder position="0 1.15 -0.5" radius="0.15" height="0.3" color="#FFF"></a-cylinder>
  <a-torus position="0.22 1.15 -0.5" radius="0.1" radius-tubular="0.02"
           rotation="0 90 0" color="#FFF"></a-torus>

  <!-- STEAM ANIMATION -->
  <a-sphere radius="0.05" color="#EEE" opacity="0.6"
            position="0 1.5 0.5"
            animation="property: position;
                       to: 0 2.2 0.5;
                       dur:2000;
                       loop:true">
  </a-sphere>

  <!-- TREES -->
  <a-cylinder position="-6 1 -6" radius="0.2" height="2" color="#6D4C41"></a-cylinder>
  <a-sphere position="-6 2.5 -6" radius="1" color="#2E7D32"></a-sphere>

  <a-cylinder position="6 1 -6" radius="0.2" height="2"></a-cylinder>
  <a-sphere position="6 2.5 -6" radius="1" color="#2E7D32"></a-sphere>

  <!-- CAMERA RIG (FOR TOUR) -->
  <a-entity id="rig" position="0 1.6 10"
            animation="property: position;
                       to: 0 1.6 6;
                       dur:4000;
                       easing:easeOutQuad">
      <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

</a-scene>

<script>
/* ===== Day / Night Toggle ===== */
let night=false;

function toggleDayNight(){
  const sky=document.querySelector("#sky");
  const sun=document.querySelector("#sun");

  night=!night;

  if(night){
    sky.setAttribute("color","#0D1B2A");
    sun.setAttribute("light","intensity:0.2");
  }else{
    sky.setAttribute("color","#87CEEB");
    sun.setAttribute("light","intensity:1");
  }
}

/* ===== Click Interaction ===== */
document.querySelectorAll(".clickable").forEach(obj=>{
  obj.addEventListener("click",()=>{
    obj.setAttribute("color",
      "#"+Math.floor(Math.random()*16777215).toString(16));
  });
});
</script>

</body>
</html>
