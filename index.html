<!DOCTYPE html>
<html>
<head>
  <title> Quiz 2 </title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body { margin:0; }

    /* ===== Loading Screen ===== */
    #loader{
      position:fixed;
      width:100%;
      height:100%;
      background:#111;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:24px;
      z-index:9999;
      font-family:Arial;
    }

    button{
      position:absolute;
      top:20px;
      left:20px;
      padding:10px 15px;
      background:#222;
      color:white;
      border:none;
      cursor:pointer;
      z-index:10;
    }
  </style>
</head>

<body>

<div id="loader">Loading 3D Scene...</div>

<button onclick="toggleDayNight()">Day / Night</button>

<a-scene shadow="type:pcfsoft">

  <!-- Background Music -->
  <a-assets>
    <audio id="bgmusic"
      src="https://cdn.pixabay.com/audio/2022/03/15/audio_6c6b1c1e6e.mp3"
      preload="auto">
    </audio>
  </a-assets>

  <!-- SKY -->
  <a-sky id="sky" color="#87CEEB"></a-sky>

  <!-- LIGHT -->
  <a-entity id="ambient" light="type:ambient; intensity:0.5"></a-entity>
  <a-entity id="sun"
            light="type:directional; intensity:1; castShadow:true"
            position="5 10 5"></a-entity>

  <!-- GROUND -->
  <a-plane rotation="-90 0 0" width="50" height="50"
           color="#4CAF50"
           shadow="receive:true"></a-plane>

  <!-- TABLE -->
  <a-box position="0 1 0" width="3" height="0.2" depth="2"
         color="#8B4513"
         shadow="cast:true"></a-box>

  <a-cylinder position="-1.3 0.5 0.8" radius="0.07" height="1"></a-cylinder>
  <a-cylinder position="1.3 0.5 0.8" radius="0.07" height="1"></a-cylinder>
  <a-cylinder position="-1.3 0.5 -0.8" radius="0.07" height="1"></a-cylinder>
  <a-cylinder position="1.3 0.5 -0.8" radius="0.07" height="1"></a-cylinder>

  <!-- CHAIRS -->
  <a-box position="-2 0.6 0" width="1" height="0.2" depth="1" color="#795548"></a-box>
  <a-box position="-2 1.3 -0.45" width="1" height="1.2" depth="0.1"></a-box>

  <a-box position="2 0.6 0" width="1" height="0.2" depth="1" color="#795548"></a-box>
  <a-box position="2 1.3 -0.45" width="1" height="1.2" depth="0.1"></a-box>

  <!-- MILO -->
  <a-cylinder position="-0.7 1.25 0"
              radius="0.25"
              height="0.7"
              color="#1B5E20"></a-cylinder>

  <a-text value="MILO"
          position="-0.7 1.3 0.26"
          align="center"
          color="white"
          width="2"></a-text>

  <!-- MILK -->
  <a-cylinder position="0.7 1.25 0"
              radius="0.25"
              height="0.7"
              color="#ECEFF1"></a-cylinder>

  <a-text value="MILK"
          position="0.7 1.3 0.26"
          align="center"
          color="black"
          width="2"></a-text>

  <!-- CUPS -->
  <a-cylinder position="0 1.15 0.5" radius="0.15" height="0.3" color="#FFF"></a-cylinder>
  <a-torus position="0.22 1.15 0.5" radius="0.1" radius-tubular="0.02"
           rotation="0 90 0" color="#FFF"></a-torus>

  <a-cylinder position="0 1.15 -0.5" radius="0.15" height="0.3" color="#FFF"></a-cylinder>
  <a-torus position="0.22 1.15 -0.5" radius="0.1" radius-tubular="0.02"
           rotation="0 90 0" color="#FFF"></a-torus>

  <!-- STEAM -->
  <a-sphere radius="0.05" color="#EEE" opacity="0.6"
            position="0 1.5 0.5"
            animation="property: position;
                       to: 0 2.2 0.5;
                       dur:2000;
                       loop:true">
  </a-sphere>

  <!-- CAMERA SHOWCASE MODE -->
  <a-entity id="rig"
    position="0 1.6 10"
    animation="property: position; to:0 1.6 6; dur:4000"
    animation__rotate="property: rotation; to:0 360 0; dur:20000; loop:true">
      <a-camera wasd-controls look-controls></a-camera>
  </a-entity>

</a-scene>

<script>
/* ===== Loading Screen ===== */
window.addEventListener("load", ()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";

    /* start music after load */
    const music=document.querySelector("#bgmusic");
    music.volume=0.2;   // subtle sound
    music.play().catch(()=>{});
  },2000);
});

/* ===== Day Night Toggle ===== */
let night=false;
function toggleDayNight(){
  const sky=document.querySelector("#sky");
  const sun=document.querySelector("#sun");

  night=!night;

  if(night){
    sky.setAttribute("color","#0D1B2A");
    sun.setAttribute("light","intensity:0.2");
  }else{
    sky.setAttribute("color","#87CEEB");
    sun.setAttribute("light","intensity:1");
  }
}
</script>

</body>
</html>
