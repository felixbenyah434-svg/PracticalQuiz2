<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Practical Quiz 2</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>
<a-scene>

  <!-- SKY -->
  <a-sky color="#87CEEB"></a-sky>

  <!-- GROUND -->
  <a-plane position="0 0 0" rotation="-90 0 0"
           width="60" height="60"
           color="#4CAF50"
           shadow="receive:true"></a-plane>

  <!-- PATH to table -->
  <a-plane position="0 0.01 2" rotation="-90 0 0"
           width="2" height="6"
           color="#A0926E"></a-plane>

  <!-- ======== TABLE ======== -->
  <!-- Tabletop -->
  <a-box position="0 1.0 0"
         width="2" height="0.08" depth="1.2"
         color="#8B5E3C"
         shadow="cast:true; receive:true"></a-box>

  <!-- Table legs -->
  <a-cylinder position="-0.85 0.5  0.5" radius="0.06" height="1.0" color="#6B3A2A" shadow="cast:true"></a-cylinder>
  <a-cylinder position=" 0.85 0.5  0.5" radius="0.06" height="1.0" color="#6B3A2A" shadow="cast:true"></a-cylinder>
  <a-cylinder position="-0.85 0.5 -0.5" radius="0.06" height="1.0" color="#6B3A2A" shadow="cast:true"></a-cylinder>
  <a-cylinder position=" 0.85 0.5 -0.5" radius="0.06" height="1.0" color="#6B3A2A" shadow="cast:true"></a-cylinder>

  <!-- ======== CHAIR 1 — front ======== -->
  <a-entity position="0 0 1.3">
    <!-- seat -->
    <a-box position="0 0.55 0" width="0.6" height="0.07" depth="0.6" color="#5C3317" shadow="cast:true"></a-box>
    <!-- front legs -->
    <a-cylinder position="-0.25 0.27  0.25" radius="0.04" height="0.55" color="#3D200A" shadow="cast:true"></a-cylinder>
    <a-cylinder position=" 0.25 0.27  0.25" radius="0.04" height="0.55" color="#3D200A" shadow="cast:true"></a-cylinder>
    <!-- back legs -->
    <a-cylinder position="-0.25 0.27 -0.25" radius="0.04" height="0.55" color="#3D200A" shadow="cast:true"></a-cylinder>
    <a-cylinder position=" 0.25 0.27 -0.25" radius="0.04" height="0.55" color="#3D200A" shadow="cast:true"></a-cylinder>
    <!-- back posts -->
    <a-cylinder position="-0.25 0.95 -0.25" radius="0.04" height="0.8" color="#3D200A" shadow="cast:true"></a-cylinder>
    <a-cylinder position=" 0.25 0.95 -0.25" radius="0.04" height="0.8" color="#3D200A" shadow="cast:true"></a-cylinder>
    <!-- backrest -->
    <a-box position="0 1.30 -0.25" width="0.58" height="0.08" depth="0.05" color="#5C3317"></a-box>
    <a-box position="0 1.05 -0.25" width="0.58" height="0.05" depth="0.05" color="#5C3317"></a-box>
  </a-entity>

  <!-- ======== CHAIR 2 — back ======== -->
  <a-entity position="0 0 -1.3" rotation="0 180 0">
    <a-box position="0 0.55 0" width="0.6" height="0.07" depth="0.6" color="#5C3317" shadow="cast:true"></a-box>
    <a-cylinder position="-0.25 0.27  0.25" radius="0.04" height="0.55" color="#3D200A" shadow="cast:true"></a-cylinder>
    <a-cylinder position=" 0.25 0.27  0.25" radius="0.04" height="0.55" color="#3D200A" shadow="cast:true"></a-cylinder>
    <a-cylinder position="-0.25 0.27 -0.25" radius="0.04" height="0.55" color="#3D200A" shadow="cast:true"></a-cylinder>
    <a-cylinder position=" 0.25 0.27 -0.25" radius="0.04" height="0.55" color="#3D200A" shadow="cast:true"></a-cylinder>
    <a-cylinder position="-0.25 0.95 -0.25" radius="0.04" height="0.8" color="#3D200A" shadow="cast:true"></a-cylinder>
    <a-cylinder position=" 0.25 0.95 -0.25" radius="0.04" height="0.8" color="#3D200A" shadow="cast:true"></a-cylinder>
    <a-box position="0 1.30 -0.25" width="0.58" height="0.08" depth="0.05" color="#5C3317"></a-box>
    <a-box position="0 1.05 -0.25" width="0.58" height="0.05" depth="0.05" color="#5C3317"></a-box>
  </a-entity>

  <!-- ======== CHAIR 3 — left ======== -->
  <a-entity position="-1.4 0 0" rotation="0 90 0">
    <a-box position="0 0.55 0" width="0.6" height="0.07" depth="0.6" color="#5C3317" shadow="cast:true"></a-box>
    <a-cylinder position="-0.25 0.27  0.25" radius="0.04" height="0.55" color="#3D200A" shadow="cast:true"></a-cylinder>
    <a-cylinder position=" 0.25 0.27  0.25" radius="0.04" height="0.55" color="#3D200A" shadow="cast:true"></a-cylinder>
    <a-cylinder position="-0.25 0.27 -0.25" radius="0.04" height="0.55" color="#3D200A" shadow="cast:true"></a-cylinder>
    <a-cylinder position=" 0.25 0.27 -0.25" radius="0.04" height="0.55" color="#3D200A" shadow="cast:true"></a-cylinder>
    <a-cylinder position="-0.25 0.95 -0.25" radius="0.04" height="0.8" color="#3D200A" shadow="cast:true"></a-cylinder>
    <a-cylinder position=" 0.25 0.95 -0.25" radius="0.04" height="0.8" color="#3D200A" shadow="cast:true"></a-cylinder>
    <a-box position="0 1.30 -0.25" width="0.58" height="0.08" depth="0.05" color="#5C3317"></a-box>
    <a-box position="0 1.05 -0.25" width="0.58" height="0.05" depth="0.05" color="#5C3317"></a-box>
  </a-entity>

  <!-- ======== MILO TIN ======== -->
  <!-- body -->
  <a-cylinder position="-0.45 1.29 -0.1" radius="0.09" height="0.50" color="#1B4D1B"></a-cylinder>
  <!-- green label -->
  <a-cylinder position="-0.45 1.26 -0.1" radius="0.092" height="0.28" color="#2E7D32"></a-cylinder>
  <!-- lid -->
  <a-cylinder position="-0.45 1.55 -0.1" radius="0.093" height="0.04" color="#145214"></a-cylinder>
  <!-- white label -->
  <a-box position="-0.45 1.26 -0.192" width="0.13" height="0.20" depth="0.002" color="#FFFFFF"></a-box>

  <!-- ======== MILK TIN ======== -->
  <!-- body -->
  <a-cylinder position="0.42 1.23 -0.1" radius="0.10" height="0.42" color="#E8EDF0"></a-cylinder>
  <!-- blue label -->
  <a-cylinder position="0.42 1.22 -0.1" radius="0.102" height="0.22" color="#1565C0"></a-cylinder>
  <!-- lid -->
  <a-cylinder position="0.42 1.45 -0.1" radius="0.103" height="0.04" color="#90A4AE"></a-cylinder>

  <!-- ======== CUP 1 ======== -->
  <a-cylinder position="-0.18 1.13 0.25" radius="0.055" height="0.13" color="#F5F5F5"></a-cylinder>
  <!-- handle -->
  <a-torus position="-0.124 1.13 0.25" radius="0.034" radius-tubular="0.007" rotation="0 90 0" color="#E0E0E0"></a-torus>
  <!-- saucer -->
  <a-cylinder position="-0.18 1.045 0.25" radius="0.09" height="0.012" color="#F5F5F5"></a-cylinder>

  <!-- ======== CUP 2 ======== -->
  <a-cylinder position="0.22 1.13 0.25" radius="0.055" height="0.13" color="#F5F5F5"></a-cylinder>
  <!-- handle -->
  <a-torus position="0.276 1.13 0.25" radius="0.034" radius-tubular="0.007" rotation="0 90 0" color="#E0E0E0"></a-torus>
  <!-- saucer -->
  <a-cylinder position="0.22 1.045 0.25" radius="0.09" height="0.012" color="#F5F5F5"></a-cylinder>

  <!-- ======== EXTRAS — beautify ======== -->

  <!-- Small vase with flower -->
  <a-cylinder position="0 1.08 -0.1" radius="0.025" height="0.14" color="#4A90D9"></a-cylinder>
  <a-sphere position="0 1.175 -0.1" radius="0.045" color="#E91E63"></a-sphere>

  <!-- Trees -->
  <!-- Tree 1 -->
  <a-cylinder position="-6 1.2 -5" radius="0.25" height="2.4" color="#5D4037"></a-cylinder>
  <a-cone     position="-6 3.5 -5" radius-bottom="1.4" radius-top="0" height="2.5" color="#2E7D32"></a-cone>
  <a-cone     position="-6 4.5 -5" radius-bottom="1.1" radius-top="0" height="2.0" color="#388E3C"></a-cone>
  <a-cone     position="-6 5.3 -5" radius-bottom="0.8" radius-top="0" height="1.5" color="#43A047"></a-cone>
  <!-- Tree 2 -->
  <a-cylinder position="6 1.2 -6" radius="0.25" height="2.4" color="#5D4037"></a-cylinder>
  <a-cone     position="6 3.5 -6" radius-bottom="1.4" radius-top="0" height="2.5" color="#2E7D32"></a-cone>
  <a-cone     position="6 4.5 -6" radius-bottom="1.1" radius-top="0" height="2.0" color="#388E3C"></a-cone>
  <a-cone     position="6 5.3 -6" radius-bottom="0.8" radius-top="0" height="1.5" color="#43A047"></a-cone>
  <!-- Tree 3 -->
  <a-cylinder position="8 1.2 2" radius="0.20" height="2.4" color="#5D4037"></a-cylinder>
  <a-cone     position="8 3.5 2" radius-bottom="1.2" radius-top="0" height="2.2" color="#33691E"></a-cone>
  <a-cone     position="8 4.4 2" radius-bottom="0.9" radius-top="0" height="1.8" color="#388E3C"></a-cone>

  <!-- Flower bushes -->
  <a-sphere position="-4 0.45 -3" radius="0.5" color="#E53935"></a-sphere>
  <a-sphere position="-3.4 0.40 -3.4" radius="0.4" color="#E53935"></a-sphere>
  <a-sphere position=" 4 0.45 -3" radius="0.5" color="#FDD835"></a-sphere>
  <a-sphere position=" 3.4 0.40 -3.4" radius="0.4" color="#FDD835"></a-sphere>

  <!-- Lamp post -->
  <a-cylinder position="3.5 1.5 1" radius="0.06" height="3.0" color="#424242"></a-cylinder>
  <a-sphere   position="3.5 3.1 1" radius="0.18" color="#FFF9C4"></a-sphere>
  <a-cylinder position="3.5 2.95 1" radius="0.10" height="0.12" color="#616161"></a-cylinder>

  <!-- Bench in background -->
  <a-box position="-4 0.45 -2" width="1.4" height="0.08" depth="0.45" color="#795548"></a-box>
  <a-box position="-4.4 0.24 -2" width="0.08" height="0.50" depth="0.40" color="#5D4037"></a-box>
  <a-box position="-3.6 0.24 -2" width="0.08" height="0.50" depth="0.40" color="#5D4037"></a-box>

  <!-- Stepping stones -->
  <a-cylinder position="-1.5 0.01 3.5" radius="0.30" height="0.04" color="#9E9E9E"></a-cylinder>
  <a-cylinder position=" 1.5 0.01 3.5" radius="0.30" height="0.04" color="#9E9E9E"></a-cylinder>
  <a-cylinder position="-2.5 0.01 5.0" radius="0.28" height="0.04" color="#9E9E9E"></a-cylinder>
  <a-cylinder position=" 0   0.01 5.5" radius="0.28" height="0.04" color="#9E9E9E"></a-cylinder>
  <a-cylinder position=" 2.5 0.01 5.0" radius="0.28" height="0.04" color="#9E9E9E"></a-cylinder>

  <!-- Low hedge border -->
  <a-box position="-2.8 0.22 -1.8" width="0.3" height="0.44" depth="3.0" color="#388E3C"></a-box>
  <a-box position=" 2.8 0.22 -1.8" width="0.3" height="0.44" depth="3.0" color="#388E3C"></a-box>

  <!-- Sun / directional light -->
  <a-light type="directional" color="#FFF5E0" intensity="1.4"
           position="5 10 3"
           cast-shadow="true"
           shadow-camera-left="-10" shadow-camera-right="10"
           shadow-camera-top="10"  shadow-camera-bottom="-10"
           shadow-map-width="1024" shadow-map-height="1024"></a-light>
  <a-light type="ambient" color="#C8E6FF" intensity="0.6"></a-light>

  <!-- CAMERA -->
  <a-entity position="0 1.6 4" id="rig">
    <a-camera look-controls wasd-controls fov="70">
      <a-cursor color="white" opacity="0.6"></a-cursor>
    </a-camera>
  </a-entity>

</a-scene>
</body>
</html>
